<!DOCTYPE html>
<html>
<head>
<title>Customer Support Ticket System</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
margin:0;
padding:0;
}

.container{
width:400px;
margin:50px auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 0 10px gray;
}

h2{
text-align:center;
}

input, select, textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.ticket{
margin-top:20px;
padding:10px;
border:1px solid #ddd;
border-radius:5px;
background:#fafafa;
}

</style>

</head>

<body>

<div class="container">

<h2>Support Ticket Form</h2>

<input type="text" id="name" placeholder="Customer Name">

<input type="email" id="email" placeholder="Email">

<select id="issue">
<option value="">Select Issue Type</option>
<option value="Technical">Technical Issue</option>
<option value="Billing">Billing Problem</option>
<option value="Account">Account Issue</option>
</select>

<select id="priority">
<option value="">Priority</option>
<option>High</option>
<option>Medium</option>
<option>Low</option>
</select>

<textarea id="desc" placeholder="Describe your problem"></textarea>

<button onclick="createTicket()">Submit Ticket</button>

<div id="tickets"></div>

</div>

<script>

function createTicket(){

let name=document.getElementById("name").value;
let issue=document.getElementById("issue").value;
let priority=document.getElementById("priority").value;

let team="";

if(issue=="Technical"){
team="Technical Support";
}
else if(issue=="Billing"){
team="Billing Team";
}
else if(issue=="Account"){
team="Account Team";
}

let ticket=document.createElement("div");
ticket.className="ticket";

ticket.innerHTML=
"<b>Name:</b> "+name+
"<br><b>Issue:</b> "+issue+
"<br><b>Priority:</b> "+priority+
"<br><b>Assigned Team:</b> "+team;

document.getElementById("tickets").appendChild(ticket);

}

</script>

</body>
</html>
