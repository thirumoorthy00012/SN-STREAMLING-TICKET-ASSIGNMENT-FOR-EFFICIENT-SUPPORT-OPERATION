<!DOCTYPE html>
<html>
<head>
<title>Agent Dashboard</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
margin:0;
padding:0;
}

.header{
background:#007BFF;
color:white;
padding:15px;
text-align:center;
}

.container{
width:90%;
margin:auto;
margin-top:30px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th, td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#343a40;
color:white;
}

button{
padding:6px 12px;
background:#28a745;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#1e7e34;
}

select{
padding:5px;
}

</style>

</head>

<body>

<div class="header">
<h2>Support Agent Dashboard</h2>
</div>

<div class="container">

<table>

<tr>
<th>Ticket ID</th>
<th>Customer Name</th>
<th>Issue Type</th>
<th>Priority</th>
<th>Assigned Team</th>
<th>Status</th>
<th>Action</th>
</tr>

<tr>
<td>1</td>
<td>Ravi</td>
<td>Technical</td>
<td>High</td>
<td>Technical Support</td>

<td>
<select id="status1">
<option>Open</option>
<option>In Progress</option>
<option>Resolved</option>
<option>Closed</option>
</select>
</td>

<td>
<button onclick="updateStatus(1)">Update</button>
</td>

</tr>

<tr>
<td>2</td>
<td>Anita</td>
<td>Billing</td>
<td>Medium</td>
<td>Billing Team</td>

<td>
<select id="status2">
<option>Open</option>
<option>In Progress</option>
<option>Resolved</option>
<option>Closed</option>
</select>
</td>

<td>
<button onclick="updateStatus(2)">Update</button>
</td>

</tr>

</table>

</div>

<script>

function updateStatus(ticketId){

alert("Ticket "+ticketId+" status updated successfully");

}

</script>

</body>
</html>
